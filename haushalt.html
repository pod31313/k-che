<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="Haushalt">
<title>Haushalt</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<style>
:root {
  --blue:       #007AFF;
  --green:      #34C759;
  --red:        #FF3B30;
  --orange:     #FF9500;
  --gray:       #8E8E93;
  --gray-light: #F2F2F7;
  --gray-mid:   #E5E5EA;
  --text:       #1C1C1E;
  --text-2:     #8E8E93;
  --bg:         #F2F2F7;
  --card:       #FFFFFF;
  --border:     #E5E5EA;
  --r:          12px;
  --safe-t:     env(safe-area-inset-top,    0px);
  --safe-b:     env(safe-area-inset-bottom, 0px);
}
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
html, body { height: 100%; }
body {
  font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Text', 'Segoe UI', sans-serif;
  background: var(--bg); color: var(--text); overflow-x: hidden;
}

/* ── TOPBAR ── */
.topbar {
  position: sticky; top: 0; z-index: 100;
  background: rgba(255,255,255,0.92);
  backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
  border-bottom: 1px solid var(--border);
  padding: calc(var(--safe-t) + 10px) 18px 10px;
  display: flex; align-items: center; justify-content: space-between;
}
.topbar-left h1 { font-size: 1.05rem; font-weight: 700; line-height: 1.2; }
.topbar-left .date { font-size: 0.78rem; color: var(--text-2); margin-top: 1px; }
.person-toggle { display: flex; background: var(--gray-light); border-radius: 9px; padding: 3px; gap: 2px; }
.person-btn {
  padding: 7px 18px; border-radius: 7px; font-size: 0.95rem; font-weight: 700;
  border: none; cursor: pointer; background: transparent; color: var(--gray); transition: all .15s;
}
.person-btn.active { background: var(--card); color: var(--text); box-shadow: 0 1px 5px rgba(0,0,0,0.15); }

/* ── CONTENT ── */
.content { padding-bottom: calc(58px + var(--safe-b) + 20px); min-height: 80vh; }

/* ── PROGRESS ── */
.progress-wrap { padding: 14px 18px 6px; }
.progress-meta { display: flex; justify-content: space-between; font-size: 0.8rem; color: var(--text-2); margin-bottom: 7px; }
.progress-meta strong { color: var(--text); }
.pbar-bg { background: var(--gray-mid); border-radius: 99px; height: 7px; overflow: hidden; }
.pbar-fill { height: 100%; background: var(--green); border-radius: 99px; transition: width .35s ease; }

/* ── SECTION LABEL ── */
.section-label {
  font-size: 0.74rem; font-weight: 600; text-transform: uppercase;
  letter-spacing: 0.06em; color: var(--text-2);
  padding: 14px 18px 6px;
  display: flex; align-items: center; justify-content: space-between;
}
.section-label-btn {
  font-size: 0.78rem; font-weight: 600; color: var(--blue);
  background: none; border: none; cursor: pointer; padding: 0;
  text-transform: none; letter-spacing: 0;
}

/* ── TASK LIST ── */
.task-list-wrap { padding: 0 14px 8px; }
.task-card { background: var(--card); border-radius: var(--r); overflow: hidden; }
.task-row {
  display: flex; align-items: center; gap: 13px;
  padding: 13px 16px; border-bottom: 1px solid var(--border);
  cursor: pointer; min-height: 54px; transition: background .1s; user-select: none;
}
.task-row:last-child { border-bottom: none; }
.task-row:active { background: var(--gray-light); }
.check {
  width: 27px; height: 27px; border-radius: 50%;
  border: 2px solid var(--gray-mid); flex-shrink: 0;
  display: flex; align-items: center; justify-content: center;
  font-size: 0.85rem; color: white; transition: all .15s;
}
.task-row.done .check { background: var(--green); border-color: var(--green); }
.task-label { flex: 1; font-size: 0.95rem; line-height: 1.3; }
.task-row.done .task-label { color: var(--text-2); }
.task-badge { font-size: 0.72rem; font-weight: 700; padding: 3px 9px; border-radius: 99px; background: var(--gray-light); color: var(--text-2); }
.task-badge.E { background: #007AFF18; color: var(--blue); }
.task-badge.B { background: #34C75918; color: var(--green); }

/* ── WEEKEND ── */
.weekend { display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 60px 30px; text-align: center; gap: 10px; }
.weekend .em { font-size: 4rem; }
.weekend h2 { font-size: 1.5rem; font-weight: 700; }
.weekend p  { font-size: 0.95rem; color: var(--text-2); }

/* ── BOTTOM NAV ── */
.bottom-nav {
  position: fixed; bottom: 0; left: 0; right: 0;
  background: rgba(255,255,255,0.94);
  backdrop-filter: blur(14px); -webkit-backdrop-filter: blur(14px);
  border-top: 1px solid var(--border);
  display: flex; padding-bottom: var(--safe-b); z-index: 100;
}
.nav-btn {
  flex: 1; display: flex; flex-direction: column; align-items: center;
  padding: 9px 4px; border: none; background: transparent; cursor: pointer;
  gap: 2px; color: var(--gray); font-size: 0.62rem; font-weight: 500; transition: color .15s;
}
.nav-btn .ico { font-size: 1.3rem; line-height: 1; }
.nav-btn.active { color: var(--blue); }

/* ── WEEK VIEW ── */
.week-wrap { padding: 0 14px 8px; }
.week-legend { display: flex; gap: 14px; padding: 6px 4px 10px; font-size: 0.76rem; color: var(--text-2); }
.leg { display: flex; align-items: center; gap: 5px; }
.leg-dot { width: 11px; height: 11px; border-radius: 50%; }
.week-table { width: 100%; border-collapse: separate; border-spacing: 0; border-radius: var(--r); overflow: hidden; }
.week-table thead th {
  font-size: 0.68rem; font-weight: 600; text-align: center; color: var(--text-2);
  padding: 0 0 8px; text-transform: uppercase; background: var(--bg);
}
.week-table thead th.today-col { color: var(--blue); }
.week-table thead th:first-child { text-align: left; }
.week-row-tr { background: var(--card); }
.week-row-tr:not(:last-child) td { border-bottom: 1px solid var(--border); }
.week-name-td { font-size: 0.82rem; padding: 9px 10px 9px 12px; max-width: 0; width: 40%; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.week-dot-td { text-align: center; padding: 6px 3px; }
.wdot { width: 28px; height: 28px; border-radius: 50%; display: inline-flex; align-items: center; justify-content: center; font-size: 0.7rem; font-weight: 700; }
.wdot.E { background: #007AFF22; color: var(--blue); }
.wdot.B { background: #34C75922; color: var(--green); }
.wdot.miss { background: var(--gray-light); }
.wdot.fut  { background: transparent; }

/* ── STATS VIEW ── */
.stats-wrap { padding: 0 14px 8px; }
.period-row { display: flex; gap: 8px; padding: 6px 4px 12px; }
.period-chip { padding: 6px 16px; border-radius: 99px; font-size: 0.82rem; font-weight: 500; border: 1.5px solid var(--border); background: var(--card); color: var(--text-2); cursor: pointer; transition: all .15s; }
.period-chip.active { background: var(--blue); border-color: var(--blue); color: #fff; }
.stats-card { background: var(--card); border-radius: var(--r); overflow: hidden; }
.stat-row { padding: 11px 16px; border-bottom: 1px solid var(--border); }
.stat-row:last-child { border-bottom: none; }
.stat-top { display: flex; justify-content: space-between; align-items: center; margin-bottom: 6px; }
.stat-name { font-size: 0.88rem; }
.stat-pct  { font-size: 0.84rem; font-weight: 700; }
.stat-bar-bg { background: var(--gray-light); border-radius: 99px; height: 5px; overflow: hidden; }
.stat-bar-fill { height: 100%; border-radius: 99px; transition: width .4s ease; }
.stat-sub { font-size: 0.72rem; color: var(--text-2); margin-top: 4px; }

/* ── SHOPPING ── */
.shop-wrap { padding: 0 14px 8px; }
.shop-cat-label { font-size: 0.74rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.06em; color: var(--text-2); padding: 10px 4px 8px; }
.chips-row { display: flex; flex-wrap: wrap; gap: 8px; padding-bottom: 4px; }
.chip {
  display: inline-flex; align-items: center; gap: 6px;
  background: var(--card); border: 1.5px solid var(--border);
  border-radius: 10px; padding: 7px 11px;
  font-size: 0.85rem; cursor: pointer; transition: all .15s; user-select: none;
}
.chip:active { opacity: .7; }
.chip.bought { opacity: .4; }
.chip.bought .chip-text { text-decoration: line-through; }
.chip-qty { font-weight: 700; font-size: 0.72rem; background: var(--gray-light); color: var(--text-2); padding: 2px 6px; border-radius: 5px; }
.chip-del { font-size: 0.8rem; color: var(--gray); margin-left: 2px; }
.shop-actions { display: flex; gap: 10px; padding: 12px 4px 6px; }
.shop-clear-btn {
  flex: 1; padding: 11px; border-radius: var(--r); border: 1.5px solid var(--border);
  background: var(--card); font-size: 0.85rem; font-weight: 500; color: var(--text-2);
  cursor: pointer; transition: all .15s;
}
.shop-clear-btn:active { background: var(--gray-light); }

/* ── ADD ITEM FORM ── */
.add-item-row { display: flex; gap: 8px; padding: 4px 4px 4px; }
.add-item-input {
  flex: 1; border: 1.5px solid var(--border); border-radius: 10px;
  padding: 10px 14px; font-size: 0.9rem; background: var(--card);
  color: var(--text); font-family: inherit; outline: none; transition: border-color .15s;
}
.add-item-input:focus { border-color: var(--blue); }
.add-item-btn {
  background: var(--blue); color: #fff; border: none; border-radius: 10px;
  padding: 10px 16px; font-size: 0.9rem; font-weight: 600; cursor: pointer; white-space: nowrap;
  transition: opacity .15s;
}
.add-item-btn:active { opacity: .8; }
.qty-cat-row { display: flex; gap: 8px; padding: 0 4px 8px; }
.small-select {
  flex: 1; border: 1.5px solid var(--border); border-radius: 10px;
  padding: 9px 10px; font-size: 0.82rem; background: var(--card);
  color: var(--text); font-family: inherit; outline: none; -webkit-appearance: none;
}

/* ── LOADING ── */
.loading { display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 50vh; gap: 14px; color: var(--text-2); font-size: 0.9rem; }
.spin { width: 30px; height: 30px; border-radius: 50%; border: 3px solid var(--gray-mid); border-top-color: var(--blue); animation: spin .8s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }

/* ── SHEETS / OVERLAYS ── */
.overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.45); display: flex; align-items: flex-end; z-index: 200; }
.sheet {
  background: var(--card); border-radius: 22px 22px 0 0;
  padding: 26px 22px calc(24px + var(--safe-b)); width: 100%;
  animation: slideUp .25s ease;
}
@keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
.sheet h2  { font-size: 1.2rem; font-weight: 700; margin-bottom: 5px; }
.sheet p   { font-size: 0.88rem; color: var(--text-2); margin-bottom: 24px; }
.user-btns { display: flex; gap: 12px; }
.user-btn {
  flex: 1; border-radius: 16px; border: 2px solid var(--border);
  background: var(--gray-light); padding: 20px 12px;
  cursor: pointer; display: flex; flex-direction: column;
  align-items: center; gap: 8px; transition: all .15s;
}
.user-btn:active { opacity: .7; }
.user-btn .initials { font-size: 2rem; font-weight: 800; }
.user-btn .name     { font-size: 0.85rem; font-weight: 500; color: var(--text); }

/* Add-task sheet */
.sheet-form { display: flex; flex-direction: column; gap: 10px; }
.sheet-input {
  border: 1.5px solid var(--border); border-radius: 12px;
  padding: 13px 16px; font-size: 1rem; font-family: inherit;
  color: var(--text); outline: none; transition: border-color .15s; background: var(--gray-light);
}
.sheet-input:focus { border-color: var(--blue); background: #fff; }
.sheet-submit {
  background: var(--blue); color: #fff; border: none; border-radius: 12px;
  padding: 14px; font-size: 1rem; font-weight: 600; cursor: pointer;
  margin-top: 4px; transition: opacity .15s;
}
.sheet-submit:active { opacity: .8; }
.sheet-cancel {
  background: var(--gray-light); color: var(--text-2); border: none; border-radius: 12px;
  padding: 13px; font-size: 0.95rem; font-weight: 500; cursor: pointer;
}
.sheet-cancel:active { opacity: .7; }
</style>
</head>
<body>

<!-- ── Person-Auswahl ── -->
<div class="overlay" id="overlayUser" style="display:none">
  <div class="sheet">
    <h2>Wer bist du?</h2>
    <p>Deine Wahl wird auf diesem Gerät gespeichert.</p>
    <div class="user-btns">
      <button class="user-btn" onclick="selectUser('E')">
        <span class="initials">E</span><span class="name">E</span>
      </button>
      <button class="user-btn" onclick="selectUser('B')">
        <span class="initials">B</span><span class="name">B</span>
      </button>
    </div>
  </div>
</div>

<!-- ── Aufgabe hinzufügen Sheet ── -->
<div class="overlay" id="overlayTask" style="display:none" onclick="closeTaskSheet(event)">
  <div class="sheet" id="taskSheet">
    <h2>Neue Aufgabe</h2>
    <p>Wird ab morgen täglich Mo–Fr getrackt.</p>
    <div class="sheet-form">
      <input class="sheet-input" id="newTaskInput" type="text" placeholder="Aufgabe eingeben …" maxlength="60">
      <button class="sheet-submit" onclick="submitNewTask()">Hinzufügen</button>
      <button class="sheet-cancel" onclick="document.getElementById('overlayTask').style.display='none'">Abbrechen</button>
    </div>
  </div>
</div>

<!-- ── Topbar ── -->
<div class="topbar">
  <div class="topbar-left">
    <h1>🏠 Haushalt</h1>
    <div class="date" id="topDate"></div>
  </div>
  <div class="person-toggle">
    <button class="person-btn" id="btnE" onclick="switchUser('E')">E</button>
    <button class="person-btn" id="btnB" onclick="switchUser('B')">B</button>
  </div>
</div>

<!-- ── Inhalt ── -->
<div class="content" id="content">
  <div class="loading"><div class="spin"></div><span>Lade …</span></div>
</div>

<!-- ── Bottom Nav ── -->
<div class="bottom-nav">
  <button class="nav-btn active" id="navH" onclick="setTab('h')">
    <span class="ico">✅</span>Heute
  </button>
  <button class="nav-btn" id="navW" onclick="setTab('w')">
    <span class="ico">📅</span>Woche
  </button>
  <button class="nav-btn" id="navE" onclick="setTab('e')">
    <span class="ico">🛒</span>Einkauf
  </button>
  <button class="nav-btn" id="navS" onclick="setTab('s')">
    <span class="ico">📊</span>Auswertung
  </button>
</div>

<script>
const SB_URL = 'https://ainggprkypgbghqxowpy.supabase.co';
const SB_KEY = 'sb_publishable_kcGLDokPdR1CNS2X9npHDA_qeWu6URm';
const db = supabase.createClient(SB_URL, SB_KEY);

// ── State ─────────────────────────────────────────────────
let user   = localStorage.getItem('hh_user') || null;
let tasks  = [];
let todayC = [];
let tab    = 'h';
let period = 28;

const DE_D  = ['So','Mo','Di','Mi','Do','Fr','Sa'];
const DE_DL = ['Sonntag','Montag','Dienstag','Mittwoch','Donnerstag','Freitag','Samstag'];
const DE_M  = ['Januar','Februar','März','April','Mai','Juni','Juli','August','September','Oktober','November','Dezember'];

// ── Helpers ───────────────────────────────────────────────
function today() { return new Date().toISOString().split('T')[0]; }
function isWeekend(ds) { const d = ds ? new Date(ds+'T12:00:00') : new Date(); return d.getDay()===0||d.getDay()===6; }
function fmtDate(d) { return `${DE_DL[d.getDay()]}, ${d.getDate()}. ${DE_M[d.getMonth()]}`; }
function weekDates() {
  const now=new Date(), dow=now.getDay(), mon=new Date(now);
  mon.setDate(now.getDate()-(dow===0?6:dow-1));
  return Array.from({length:5},(_,i)=>{ const d=new Date(mon); d.setDate(mon.getDate()+i); return d.toISOString().split('T')[0]; });
}

// ── Supabase: Tasks ───────────────────────────────────────
async function loadTasks() {
  const {data,error}=await db.from('tasks').select('*').eq('active',true).order('sort_order');
  if(error) throw error; tasks=data||[];
}
async function loadToday() {
  const {data,error}=await db.from('completions').select('*').eq('date',today());
  if(error) throw error; todayC=data||[];
}
async function loadWeek() {
  const wd=weekDates();
  const {data,error}=await db.from('completions').select('*').gte('date',wd[0]).lte('date',wd[4]);
  if(error) throw error; return data||[];
}
async function loadStats() {
  const end=today(), start=new Date();
  start.setDate(start.getDate()-period);
  const {data,error}=await db.from('completions').select('*').gte('date',start.toISOString().split('T')[0]).lte('date',end);
  if(error) throw error; return data||[];
}
async function toggle(taskId) {
  if(!user){document.getElementById('overlayUser').style.display='flex';return;}
  const existing=todayC.find(c=>c.task_id===taskId);
  if(existing){ todayC=todayC.filter(c=>c.id!==existing.id); }
  else { todayC.push({id:'_tmp',task_id:taskId,date:today(),done_by:user}); }
  renderToday();
  if(existing){ await db.from('completions').delete().eq('id',existing.id); }
  else {
    const {data}=await db.from('completions').insert({task_id:taskId,date:today(),done_by:user}).select().single();
    if(data){ todayC=todayC.filter(c=>c.id!=='_tmp'); todayC.push(data); }
  }
}
async function submitNewTask() {
  const input=document.getElementById('newTaskInput');
  const text=input.value.trim();
  if(!text) return;
  const maxOrder=tasks.length ? Math.max(...tasks.map(t=>t.sort_order))+1 : 1;
  const {data,error}=await db.from('tasks').insert({text,sort_order:maxOrder,active:true}).select().single();
  if(!error&&data){
    tasks.push(data);
    input.value='';
    document.getElementById('overlayTask').style.display='none';
    if(tab==='h') renderToday();
  }
}
function closeTaskSheet(e){ if(e.target===document.getElementById('overlayTask')) document.getElementById('overlayTask').style.display='none'; }

// ── Supabase: Shopping ────────────────────────────────────
async function loadShopping() {
  const {data,error}=await db.from('shopping_items').select('*').order('created_at');
  if(error) throw error; return data||[];
}
async function toggleShop(id) {
  const items=window._shopItems||[];
  const item=items.find(i=>i.id===id);
  if(!item) return;
  const newBought=!item.bought;
  item.bought=newBought; renderShopItems(items);
  await db.from('shopping_items').update({bought:newBought}).eq('id',id);
}
async function addShopItem() {
  const textEl=document.getElementById('shopText');
  const qtyEl =document.getElementById('shopQty');
  const catEl =document.getElementById('shopCat');
  const text=textEl.value.trim();
  if(!text) return;
  const {data,error}=await db.from('shopping_items').insert({text,quantity:qtyEl.value||'1×',category:catEl.value||'Lebensmittel',added_by:user||'?'}).select().single();
  if(!error&&data){ window._shopItems.push(data); textEl.value=''; renderShopItems(window._shopItems); }
}
async function clearBought() {
  const items=window._shopItems||[];
  const boughtIds=items.filter(i=>i.bought).map(i=>i.id);
  if(!boughtIds.length) return;
  await db.from('shopping_items').delete().in('id',boughtIds);
  window._shopItems=items.filter(i=>!i.bought);
  renderShopItems(window._shopItems);
}

// ── User ──────────────────────────────────────────────────
function selectUser(u){ user=u; localStorage.setItem('hh_user',u); document.getElementById('overlayUser').style.display='none'; refreshToggle(); if(tab==='h') renderToday(); }
function switchUser(u){ user=u; localStorage.setItem('hh_user',u); refreshToggle(); if(tab==='h') renderToday(); }
function refreshToggle(){
  document.getElementById('btnE').classList.toggle('active',user==='E');
  document.getElementById('btnB').classList.toggle('active',user==='B');
}

// ── Tabs ──────────────────────────────────────────────────
function setTab(t){
  tab=t;
  ['H','W','E','S'].forEach(x=>document.getElementById('nav'+x).classList.remove('active'));
  document.getElementById('nav'+t.toUpperCase()).classList.add('active');
  renderTab();
}
async function renderTab(){
  if(tab==='h'){ renderToday(); }
  else if(tab==='w'){ showLoading(); const d=await loadWeek().catch(()=>[]); renderWeek(d); }
  else if(tab==='e'){ showLoading(); const d=await loadShopping().catch(()=>[]); window._shopItems=d; renderShop(d); }
  else { showLoading(); const d=await loadStats().catch(()=>[]); renderStats(d); }
}
function showLoading(){ document.getElementById('content').innerHTML='<div class="loading"><div class="spin"></div></div>'; }

// ── Render: Heute ─────────────────────────────────────────
function renderToday(){
  const el=document.getElementById('content');
  if(isWeekend()){ el.innerHTML=`<div class="weekend"><div class="em">🛋️</div><h2>Wochenende!</h2><p>Heute kein Tracking. Erhol dich.</p></div>`; return; }
  const doneSet=new Set(todayC.map(c=>c.task_id));
  const done=doneSet.size, total=tasks.length;
  const pct=total?Math.round(done/total*100):0;
  let rows='';
  tasks.forEach(t=>{
    const c=todayC.find(x=>x.task_id===t.id), isDone=!!c;
    rows+=`<div class="task-row ${isDone?'done':''}" onclick="toggle('${t.id}')">
      <div class="check">${isDone?'✓':''}</div>
      <div class="task-label">${t.text}</div>
      ${isDone?`<span class="task-badge ${c.done_by}">${c.done_by}</span>`:''}
    </div>`;
  });
  el.innerHTML=`
    <div class="progress-wrap">
      <div class="progress-meta"><span><strong>${done}</strong> von ${total} erledigt</span><span>${pct}%</span></div>
      <div class="pbar-bg"><div class="pbar-fill" style="width:${pct}%"></div></div>
    </div>
    <div class="section-label">
      <span>Aufgaben heute</span>
      <button class="section-label-btn" onclick="document.getElementById('overlayTask').style.display='flex'">+ Aufgabe</button>
    </div>
    <div class="task-list-wrap"><div class="task-card">${rows}</div></div>`;
}

// ── Render: Woche ─────────────────────────────────────────
function renderWeek(data){
  const el=document.getElementById('content');
  const wd=weekDates(), t0=today();
  const idx={};
  data.forEach(c=>{ idx[c.task_id+'_'+c.date]=c; });
  const headers=wd.map(d=>{
    const day=new Date(d+'T12:00:00'), isT=d===t0;
    return `<th class="${isT?'today-col':''}">${DE_D[day.getDay()]}<br><span style="font-weight:400;font-size:.62rem">${day.getDate()}.${day.getMonth()+1}.</span></th>`;
  }).join('');
  const trows=tasks.map(t=>{
    const cells=wd.map(d=>{
      const c=idx[t.id+'_'+d], fut=d>t0;
      if(c) return `<td class="week-dot-td"><div class="wdot ${c.done_by}">${c.done_by}</div></td>`;
      if(fut) return `<td class="week-dot-td"><div class="wdot fut"></div></td>`;
      return `<td class="week-dot-td"><div class="wdot miss"></div></td>`;
    }).join('');
    return `<tr class="week-row-tr"><td class="week-name-td">${t.text}</td>${cells}</tr>`;
  }).join('');
  el.innerHTML=`
    <div class="section-label"><span>Diese Woche (Mo–Fr)</span></div>
    <div class="week-wrap">
      <div class="week-legend">
        <div class="leg"><div class="leg-dot" style="background:#007AFF33"></div>E erledigt</div>
        <div class="leg"><div class="leg-dot" style="background:#34C75933"></div>B erledigt</div>
        <div class="leg"><div class="leg-dot" style="background:var(--gray-mid)"></div>Offen/verpasst</div>
      </div>
      <table class="week-table">
        <thead><tr><th></th>${headers}</tr></thead>
        <tbody>${trows}</tbody>
      </table>
    </div>`;
}

// ── Render: Shopping ──────────────────────────────────────
function renderShop(items){
  document.getElementById('content').innerHTML=`
    <div class="section-label"><span>Einkaufsliste</span></div>
    <div class="shop-wrap" id="shopWrap"></div>`;
  renderShopItems(items);
}
function renderShopItems(items){
  window._shopItems=items;
  const wrap=document.getElementById('shopWrap');
  if(!wrap) return;
  const cats=[...new Set(items.map(i=>i.category))].filter(Boolean);
  const allCats=['Lebensmittel','Haushalt','Sonstiges'];
  const activeCats=allCats.filter(c=>cats.includes(c));
  if(!activeCats.length&&items.length===0) activeCats.push('Lebensmittel');

  let html='';
  const withItems=allCats.filter(c=>items.some(i=>i.category===c));
  withItems.forEach(cat=>{
    const catItems=items.filter(i=>i.category===cat);
    if(!catItems.length) return;
    html+=`<div class="shop-cat-label">${cat}</div><div class="chips-row">`;
    catItems.forEach(item=>{
      html+=`<div class="chip ${item.bought?'bought':''}" onclick="toggleShop('${item.id}')">
        <span class="chip-qty">${item.quantity}</span>
        <span class="chip-text">${item.text}</span>
      </div>`;
    });
    html+=`</div>`;
  });

  const boughtCount=items.filter(i=>i.bought).length;
  html+=`
    <div class="shop-cat-label" style="margin-top:8px">Artikel hinzufügen</div>
    <div class="qty-cat-row">
      <input class="small-select" id="shopQty" type="text" value="1×" placeholder="Menge" style="max-width:80px">
      <select class="small-select" id="shopCat">
        <option value="Lebensmittel">Lebensmittel</option>
        <option value="Haushalt">Haushalt</option>
        <option value="Sonstiges">Sonstiges</option>
      </select>
    </div>
    <div class="add-item-row">
      <input class="add-item-input" id="shopText" type="text" placeholder="Artikel …" maxlength="40">
      <button class="add-item-btn" onclick="addShopItem()">+ Add</button>
    </div>
    ${boughtCount>0?`<div class="shop-actions"><button class="shop-clear-btn" onclick="clearBought()">🗑 Erledigt löschen (${boughtCount})</button></div>`:''}
  `;
  wrap.innerHTML=html;

  // Enter key
  const shopTextEl=document.getElementById('shopText');
  if(shopTextEl) shopTextEl.addEventListener('keydown',e=>{ if(e.key==='Enter') addShopItem(); });
}

// ── Render: Auswertung ────────────────────────────────────
function renderStats(data){
  const el=document.getElementById('content');
  let wdays=0;
  for(let i=0;i<period;i++){ const d=new Date(); d.setDate(d.getDate()-i); if(!isWeekend(d.toISOString().split('T')[0])) wdays++; }
  const counts={};
  tasks.forEach(t=>{ counts[t.id]=0; });
  data.forEach(c=>{ if(counts[c.task_id]!==undefined) counts[c.task_id]++; });
  const sorted=[...tasks].sort((a,b)=>counts[a.id]-counts[b.id]);
  const rows=sorted.map(t=>{
    const n=counts[t.id], pct=wdays?Math.round(n/wdays*100):0;
    const col=pct>=80?'#34C759':pct>=50?'#FF9500':'#FF3B30';
    return `<div class="stat-row">
      <div class="stat-top"><span class="stat-name">${t.text}</span><span class="stat-pct" style="color:${col}">${pct}%</span></div>
      <div class="stat-bar-bg"><div class="stat-bar-fill" style="width:${pct}%;background:${col}"></div></div>
      <div class="stat-sub">${n} von ${wdays} Werktagen erledigt</div>
    </div>`;
  }).join('');
  const chips=[7,28,90].map(d=>`<button class="period-chip ${period===d?'active':''}" onclick="changePeriod(${d})">${d===7?'7 Tage':d===28?'4 Wochen':'3 Monate'}</button>`).join('');
  el.innerHTML=`
    <div class="section-label"><span>Auswertung – Rückblick pro Aufgabe</span></div>
    <div class="stats-wrap">
      <div class="period-row">${chips}</div>
      <div class="stats-card">${rows}</div>
    </div>`;
}
async function changePeriod(d){ period=d; showLoading(); const data=await loadStats().catch(()=>[]); renderStats(data); }

// ── Enter key for add task ────────────────────────────────
document.addEventListener('keydown', e => {
  if(e.key==='Enter' && document.getElementById('overlayTask').style.display!=='none') submitNewTask();
});

// ── Init ──────────────────────────────────────────────────
async function init(){
  document.getElementById('topDate').textContent=fmtDate(new Date());
  if(!user){ document.getElementById('overlayUser').style.display='flex'; }
  else { refreshToggle(); }
  try {
    await loadTasks(); await loadToday(); renderToday();
  } catch(e){
    document.getElementById('content').innerHTML=`<div class="loading"><span style="font-size:2rem">⚠️</span><span>Verbindungsfehler – bitte Internetverbindung prüfen.</span></div>`;
  }
}
init();
</script>
